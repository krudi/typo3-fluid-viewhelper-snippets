name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version without the v prefix, for example 0.5.0'
                required: true
                type: string
            create_latest:
                description: 'Mark the GitHub release as latest'
                required: true
                default: true
                type: boolean

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        if: ${{ github.actor != 'dependabot[bot]' }}
        permissions:
            contents: write
        uses: krudi/reusable-actions/.github/workflows/create-release.yaml@main
        with:
            version: ${{ inputs.version }}
            create_latest: ${{ inputs.create_latest }}
            working_directory: .
            package_json_path: package.json
            package_lock_path: package-lock.json
            node_version_file: .nvmrc
            tag_prefix: 'v'
            commit_message: 'chore(release): bump typo3-fluid-viewhelper-snippets from {old} to {new}'
