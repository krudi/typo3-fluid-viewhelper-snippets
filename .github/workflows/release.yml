name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version without the v prefix, for example 0.5.0'
                required: true
                type: string
            create_latest:
                description: 'Mark the GitHub release as latest'
                required: true
                default: true
                type: boolean

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        if: ${{ github.actor != 'dependabot[bot]' }}
        permissions:
            contents: write
        uses: krudi/reusable-actions/.github/workflows/release-and-publish.yaml@main
        with:
            version: ${{ inputs.version }}
            publish_target: vscode
            create_latest: ${{ inputs.create_latest }}
            working_directory: .
            package_json_path: package.json
            package_lock_path: package-lock.json
            node_version_file: .nvmrc
            tag_prefix: 'v'
            commit_message: 'chore(release): bump typo3-fluid-viewhelper-snippets from {old} to {new}'
            install_command: npm ci
            check_command: npm run lint:prettier
            package_command: npx @vscode/vsce package
            publish_command: npx @vscode/vsce publish -p "$VSCE_PAT"
            vsce_glob: '*.vsix'
        secrets:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            VSCE_PAT: ${{ secrets.VSCE_PAT }}
